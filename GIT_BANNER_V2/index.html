<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitBanner — GitHub Profile Banners for Twitter & LinkedIn</title>
    <meta
      name="description"
      content="Generate beautiful GitHub profile banners — contribution graphs, stats, and pinned repos — ready for Twitter/X and LinkedIn."
    />
    <meta property="og:title" content="GitBanner" />
    <meta
      property="og:description"
      content="Generate beautiful GitHub profile banners for Twitter/X and LinkedIn."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GitBanner" />
    <meta
      name="twitter:description"
      content="Generate beautiful GitHub profile banners for Twitter/X and LinkedIn."
    />
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemPrefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
