<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="robots" content="index, follow" />

    <title>GitBanner — GitHub Profile Banners for Twitter & LinkedIn</title>
    <meta
      name="description"
      content="Generate beautiful GitHub profile banners — contribution graphs, stats, and pinned repos — sized for Twitter/X and LinkedIn. Free, instant, no sign-up."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GitBanner — GitHub Profile Banners" />
    <meta
      property="og:description"
      content="Generate beautiful GitHub profile banners — contribution graphs, stats, and pinned repos — sized for Twitter/X and LinkedIn. Free, instant, no sign-up."
    />
    <!-- Replace with your deployed URL after first deploy -->
    <meta property="og:url" content="https://git-banner-v2.vercel.app" />
    <meta
      property="og:image"
      content="https://git-banner-v2.vercel.app/twitter-card.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GitBanner — GitHub Profile Banners" />
    <meta
      name="twitter:description"
      content="Generate beautiful GitHub profile banners for Twitter/X and LinkedIn. Free, instant, no sign-up."
    />
    <meta
      name="twitter:image"
      content="https://git-banner-v2.vercel.app/twitter-card.png"
    />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "GitBanner",
        "description": "Generate GitHub profile banners — contribution graphs, stats, and pinned repos — sized for Twitter/X and LinkedIn.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "All",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemPrefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
